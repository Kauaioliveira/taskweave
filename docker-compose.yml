services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: taskweave
      POSTGRES_PASSWORD: taskweave
      POSTGRES_DB: taskweave
    volumes:
      - taskweave_pg:/var/lib/postgresql/data

volumes:
  taskweave_pg:
