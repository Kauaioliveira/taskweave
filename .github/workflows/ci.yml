name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: taskweave
        options: >-
          --health-cmd "pg_isready -U postgres -d taskweave"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskweave
      AUTH_SECRET: ci-auth-secret-must-be-long-enough-for-authjs-32chars
      AUTH_GITHUB_ID: dummy-client-id
      AUTH_GITHUB_SECRET: dummy-client-secret
      E2E_TEST: "1"
      E2E_PASSWORD: e2e-ci-password
      AUTH_TRUST_HOST: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Prisma generate
        run: npx prisma generate

      - name: Database schema
        run: npx prisma db push

      - name: Seed E2E user
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
